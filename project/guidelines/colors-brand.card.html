<!-- @dsCard group="Colors" viewport="700x190" name="Brand palette" subtitle="The five flat brand colours — no gradients except the logo" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; padding: 22px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--tvm-on-light-12); }
  .chip { height: 84px; }
  .meta { padding: 10px 12px; }
  .name { font-weight: 600; font-size: 13px; color: var(--tvm-near-black); letter-spacing: .01em; }
  .hex { font-size: 12px; color: var(--tvm-on-light-45); margin-top: 2px; font-variant-numeric: tabular-nums; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--tvm-near-black)"></div><div class="meta"><div class="name">Near Black</div><div class="hex">#08081A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--tvm-deep-teal)"></div><div class="meta"><div class="name">Deep Teal</div><div class="hex">#00A87C</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--tvm-forest-green)"></div><div class="meta"><div class="name">Forest Green</div><div class="hex">#16A34A</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--tvm-deep-violet)"></div><div class="meta"><div class="name">Deep Violet</div><div class="hex">#4C1D95</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--tvm-pale-mint)"></div><div class="meta"><div class="name">Pale Mint</div><div class="hex">#ECFDF5</div></div></div>
  </div>
</body>
</html>
