<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow label" subtitle="DM Sans uppercase, wide tracking, Forest Green — sits above every headline" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; padding: 28px; }
  .eyebrow { font-size: var(--type-eyebrow); font-weight: 600; text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); color: var(--accent-eyebrow); }
  h2 { font-family: var(--font-display); font-weight: 400; font-size: 40px; margin: 10px 0 0; color: var(--tvm-near-black); line-height: .98; letter-spacing: .01em; }
  .meta { font-size: 12px; color: var(--tvm-on-light-45); margin-top: 16px; }
</style>
</head>
<body>
  <div class="eyebrow">What it does for you</div>
  <h2>A Receptionist That Earns Its Keep.</h2>
  <div class="meta">DM Sans · 600 · 13px · uppercase · tracking 0.18em · Forest Green #16A34A</div>
</body>
</html>
