<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — generous spacing is a brand signature" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; padding: 24px; }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--tvm-deep-teal); width: 26px; border-radius: 4px; }
  .lbl { font-size: 11px; color: var(--tvm-on-light-45); font-variant-numeric: tabular-nums; }
  .px { font-size: 11px; font-weight: 600; color: var(--tvm-near-black); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:8px"></div><span class="px">2</span><span class="lbl">8</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="px">4</span><span class="lbl">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="px">5</span><span class="lbl">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="px">6</span><span class="lbl">32</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="px">7</span><span class="lbl">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="px">8</span><span class="lbl">64</span></div>
    <div class="item"><div class="bar" style="height:96px"></div><span class="px">9</span><span class="lbl">96</span></div>
  </div>
</body>
</html>
