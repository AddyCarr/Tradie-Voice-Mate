<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--tvm-near-black); padding: 28px; color: #fff; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .col { border-left: 1px solid var(--tvm-on-dark-15); padding-left: 18px; }
  .num { font-family: var(--font-display); font-size: 72px; line-height: .9; color: var(--tvm-deep-teal); }
  .ft { font-family: var(--font-display); font-size: 19px; letter-spacing: .02em; margin-top: 6px; }
  .bd { font-size: 13px; color: var(--tvm-on-dark-70); margin-top: 4px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="num">01</div><div class="ft">24/7 COVERAGE</div><div class="bd">On site, in the ute, or 10pm Sunday.</div></div>
    <div class="col"><div class="num">02</div><div class="ft">SMS IN 30 SECONDS</div><div class="bd">Full lead details the moment the call ends.</div></div>
    <div class="col"><div class="num">03</div><div class="ft">SOUNDS REAL</div><div class="bd">A natural, Australian-accented conversation.</div></div>
  </div>
</body>
</html>
