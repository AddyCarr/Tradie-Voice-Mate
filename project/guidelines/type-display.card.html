<!-- @dsCard group="Type" viewport="700x230" name="Display — Staatliches" subtitle="Headlines: very large, tight leading, near-uppercase confidence" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--tvm-near-black); padding: 28px; color: #fff; }
  h1 { font-family: var(--font-display); font-weight: 400; margin: 0; line-height: var(--leading-display); letter-spacing: var(--tracking-display); font-size: 64px; }
  .meta { font-size: 12px; color: var(--tvm-on-dark-50); margin-top: 16px; font-variant-numeric: tabular-nums; }
  .teal { color: var(--tvm-deep-teal); }
</style>
</head>
<body>
  <h1>While You're On The Job,<br>It's Got The <span class="teal">Phone.</span></h1>
  <div class="meta">Staatliches · 400 · clamp 52–88px · leading 0.95 · tracking 0.01em</div>
</body>
</html>
